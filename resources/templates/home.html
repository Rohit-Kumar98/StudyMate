{% extends 'base.html' %}

{% block content %}

<div class="card">
    <h1>Welcome to StudyMate</h1>

    <p>
        Your Verified College Resource Sharing Platform
    </p>

    <p>
        Upload notes, PYQs, quizzes, assignments,
        and access approved academic resources easily.
    </p>

    {% if not user.is_authenticated %}
        <a href="/login/">
            <button>Login</button>
        </a>

        <a href="/signup/">
            <button>Signup</button>
        </a>
    {% endif %}
</div>

{% endblock %}
